name: lens self-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: '8.3'
          extensions: phar, zlib
          coverage: none

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            vendor
            .lens
          key: lens-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: lens-${{ runner.os }}-

      - run: composer install --no-interaction --no-progress --prefer-dist

      - name: Tests
        run: composer test

      - name: Build PHAR
        run: composer run build

      - name: Self-check via PHAR
        run: builds/lens check --ci
