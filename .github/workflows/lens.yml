name: lens self-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: phar, zlib
          coverage: none

      - uses: actions/cache@v4
        with:
          path: |
            vendor
            .lens
          key: lens-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: lens-${{ runner.os }}-

      - run: composer install --no-interaction --no-progress --prefer-dist

      - name: Tests
        run: composer test

      - name: Build PHAR
        run: composer run build

      - name: Self-check via PHAR
        run: builds/lens check --ci
